# Deploys the umbrella chart (infra/helm/beekeepingit) onto the `staging`
# cluster (Scaleway Kapsule, D-26) the same way apps/dev/beekeepingit-helmrelease.yaml
# does for dev — see that file's comments for the releaseName/reconcileStrategy
# rationale, which applies unchanged here.
#
# Hostnames use nip.io (https://nip.io) — a free wildcard DNS service that
# resolves <anything>.<ip-with-dashes>.nip.io to that literal IP, no
# registration needed — since no real domain is owned yet. This is real
# public DNS (not a local hosts-file hack), so it works from any device
# (including mobile) and lets Let's Encrypt's HTTP-01 challenge issue a
# genuinely trusted cert against it (see cert-manager-issuer.yaml). Swap for
# a real domain later by updating global.appOrigin/gateway.appHost/authHost/
# services.oidc.issuerUrl below — nothing else needs to change.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: beekeepingit
  namespace: flux-system
spec:
  interval: 5m
  targetNamespace: beekeepingit-staging
  releaseName: beekeepingit
  install:
    createNamespace: true
    # disableWait (= Helm's `--wait=false`): Helm's default wait-for-ready
    # gates *all* main resources (every Deployment) before it's considered
    # successful — but post-install hooks (charts/postgres/templates/
    # schema-grants-job.yaml, which every DB-backed service's migration and
    # PowerSync's `powersync_storage` connection depend on) only run *after*
    # that wait succeeds. On a truly from-scratch install those Deployments
    # can never become Ready without the hook, and the hook never runs
    # without them being Ready first — a hard deadlock, observed on the
    # first staging bring-up (D-26): the schema-grants Job never even got
    # created, confirmed via `kubectl get jobs`, across repeated attempts.
    # Disabling wait lets hooks fire right after resources are applied
    # instead of being gated behind their readiness; Flux's own separate
    # health-check/reconciliation still reports actual pod health. dev has
    # never hit this because its Flux HelmRelease has only ever *upgraded*
    # an already-successfully-installed release — that release was
    # originally bootstrapped by a manual `helm install` (no `--wait` by
    # default on the raw CLI), which sidesteps the deadlock entirely. Same
    # gap likely exists in apps/dev/beekeepingit-helmrelease.yaml, just
    # never exercised — see FOLLOWUPS.md.
    disableWait: true
    timeout: 10m
    remediation:
      retries: 3
  upgrade:
    disableWait: true
    timeout: 10m
  chart:
    spec:
      chart: ./infra/helm/beekeepingit
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: beekeepingit
        namespace: flux-system
  values:
    global:
      environment: staging
      namespace: beekeepingit-staging
      # Must match gateway.appHost below (scheme + host, standard 443 via the
      # real LoadBalancer/Ingress — no dev-only :8443 port here) — the
      # Authentik blueprint's OAuth2 redirect_uris/CORS-allowed-origins read
      # this, and a mismatch fails login with redirect_uri mismatch (observed
      # on the first staging bring-up, D-26).
      appOrigin: https://app.51-159-204-90.nip.io
    gateway:
      appHost: app.51-159-204-90.nip.io
      authHost: auth.51-159-204-90.nip.io
      certManager:
        enabled: true
        clusterIssuer: letsencrypt-prod
    # Image tags are set by the release-triggered tag-bump PR (D-27, ADR-0018):
    # cutting a `-rc` release publishes that version's images and opens a PR
    # bumping the tags below; merging it makes Flux reconcile. No image-automation
    # and no Flux Git-write credential — the tags stay as set until such a PR lands.
    services:
      oidc:
        # Chart defaults (charts/services/values.yaml) hardcode the dev `.local`
        # host; staging needs its own, mirroring environments/dev.yaml's same
        # split-issuer pattern (ADR-0016, oidc-integration.md §6) — the `iss` a
        # browser token carries is the external HTTPS auth host, but services
        # fetch discovery from the internal Authentik Service (unreachable
        # externally in-cluster). Keep in sync with gateway.authHost above.
        issuerUrl: https://auth.51-159-204-90.nip.io/application/o/beekeepingit/
        discoveryUrl: http://authentik-server/application/o/beekeepingit/
        audience: beekeepingit-pwa
      # All 7 services the `services` subchart actually renders (per
      # charts/services/values.yaml) — correcting an earlier wrong claim here
      # that only identity/organizations/apiaries/sync were real (verified
      # live on the staging cluster: activities/journeys/todos are deployed
      # Deployments too, not just reserved Postgres schemas). `ai` has no
      # service yet, hence its absence here.
      services:
        identity:
          tag: latest
        organizations:
          tag: latest
        apiaries:
          tag: latest
        activities:
          tag: latest
        journeys:
          tag: latest
        todos:
          tag: latest
        sync:
          tag: latest
    pwa:
      image:
        # One-off manual build (not CI yet), compiled with staging's real
        # nip.io OIDC/gateway/PowerSync URLs via --dart-define — the client's
        # AppConfig reads these at Dart *compile* time, not runtime. Under D-27
        # (ADR-0018) the deployable PWA build moves into release-deploy.yml,
        # tagged by release version; the release tag-bump PR replaces this
        # manual tag once that lands (see FOLLOWUPS.md).
        tag: staging-manual
    networkpolicy:
      # scaleway-up.sh installs Traefik into its own `traefik` namespace, not
      # `kube-system` (charts/networkpolicy/values.yaml's default, correct
      # for k3d/dev) — every gateway-to-backend NetworkPolicy edge silently
      # blocked Traefik without this, including cert-manager's ACME solver
      # pods (found via cert-manager's self-check timing out, D-26).
      gatewayNamespace: traefik
