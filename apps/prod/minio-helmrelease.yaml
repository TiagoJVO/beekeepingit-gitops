# MinIO (NFR-ARC-2) for a future `prod` cluster — see
# beekeepingit-helmrelease.yaml's header (not deployed yet, prepared per
# D-26). Mirrors apps/staging/minio-helmrelease.yaml exactly,
# namespace-adjusted — see that file's comments for the full rationale.
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: minio
  namespace: flux-system
spec:
  interval: 1h
  url: https://charts.min.io/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: minio
  namespace: flux-system
spec:
  interval: 5m
  targetNamespace: beekeepingit-prod
  releaseName: minio
  install:
    createNamespace: true
  dependsOn:
    - name: beekeepingit
  chart:
    spec:
      chart: minio
      version: "5.4.0"
      sourceRef:
        kind: HelmRepository
        name: minio
        namespace: flux-system
  values:
    mode: standalone
    replicas: 1
    existingSecret: root-credentials
    persistence:
      enabled: true
      size: 2Gi
    resources:
      requests: { cpu: 25m, memory: 128Mi }
      limits: { cpu: 100m, memory: 256Mi }
    ingress:
      enabled: false
    consoleIngress:
      enabled: false
