# Points Flux at the app-level manifests for a future `prod` cluster — see
# flux-system.yaml's header (not deployed yet, prepared per D-26). Mirrors
# clusters/staging/apps.yaml.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: beekeepingit-prod
  namespace: flux-system
spec:
  interval: 5m
  sourceRef:
    kind: GitRepository
    name: beekeepingit-gitops
  path: ./apps/prod
  prune: true
  dependsOn:
    - name: flux-system
