# Bootstrap objects for a future `prod` cluster — NOT deployed anywhere yet
# (D-26: prod is deliberately deferred until Q-DR and #90 land at M6, see the
# code repo's infra/helm/beekeepingit/environments/prod.yaml header). Prepared
# now, mirroring clusters/staging/flux-system.yaml exactly, so prod's eventual
# bring-up starts from the already-fixed pattern instead of rediscovering
# staging's bugs from scratch. Inert Git state until someone runs the one-time
# `kubectl apply -f clusters/prod/` bootstrap against a real prod cluster.
#
# TWO GitRepository sources (D-27/ADR-0018 repo split): MANIFESTS from this
# beekeepingit-gitops repo, CHART from the beekeepingit code repo.
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: beekeepingit-gitops
  namespace: flux-system
spec:
  interval: 1m
  url: https://github.com/TiagoJVO/beekeepingit-gitops
  ref:
    branch: main
---
# Chart source: apps/prod/beekeepingit-helmrelease.yaml references this by name
# for `chart: ./infra/helm/beekeepingit` in the code repo.
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: beekeepingit
  namespace: flux-system
spec:
  interval: 1m
  url: https://github.com/TiagoJVO/beekeepingit
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-system
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: beekeepingit-gitops
  path: ./clusters/prod
  prune: true
